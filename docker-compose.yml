version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: ecommerce-mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: irishana
      MYSQL_DATABASE: ecommerce_db

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: ecommerce-app
    restart: always

    depends_on:
      - mysql

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ecommerce_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: irishana
      JWT_SECRET: ws101ws101ws101ws101ws101ws101ws101ws101

volumes:
  mysql_data: