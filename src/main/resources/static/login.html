<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

    <h2>Login</h2>

    <input
        type="text"
        id="username"
        placeholder="Username">

    <br><br>

    <input
        type="password"
        id="password"
        placeholder="Password">

    <br><br>

    <button onclick="login()">
        Login
    </button>

    <script>

        async function login() {

            const username =
                document.getElementById("username").value;

            const password =
                document.getElementById("password").value;

            try {

                const response = await fetch(
                    "http://localhost:8080/api/v1/auth/login",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            username: username,
                            password: password
                        })
                    }
                );

                if (!response.ok) {
                    alert("Invalid username or password");
                    return;
                }

                const data = await response.json();

                localStorage.setItem(
                    "token",
                    data.token
                );

                alert("Login Success!");

                window.location.href =
                    "/index.html";

            } catch (error) {

                console.error(error);

                alert("Login Failed");

            }
        }

    </script>

</body>
</html>
